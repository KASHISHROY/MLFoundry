

services:
  # ─── FastAPI Backend ───────────────────────────────────
  backend:
    build: ./backend
    container_name: omniml_backend
    ports:
      - "8000:8000"          # your laptop's port 8000 → container's port 8000
    volumes:
      - ./backend:/app       # live reload: changes on your PC reflect instantly
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── PostgreSQL Database ───────────────────────────────
  db:
    image: postgres:15
    container_name: omniml_db
    environment:
      POSTGRES_USER: omniml_user
      POSTGRES_PASSWORD: omniml_pass
      POSTGRES_DB: omniml_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data persists even if container restarts

  # ─── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: omniml_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: